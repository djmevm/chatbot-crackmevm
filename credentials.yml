# ============================================================
# CREDENTIALS - Crack MEVM Soluciones Informáticas
# Configuración de canales de comunicación
# ============================================================

# ============================================================
# CANAL REST (API HTTP)
# ============================================================
# Permite comunicación mediante peticiones HTTP
# Útil para integrar con sitios web, apps móviles, etc.

rest:
  # URL base para el webhook
  # webhook_url: "http://localhost:5005/webhooks/rest/webhook"

# ============================================================
# CANAL DE CONSOLA (Para pruebas locales)
# ============================================================
# Interactúa con el bot desde la terminal

# console:

# ============================================================
# FACEBOOK MESSENGER
# ============================================================
# Descomenta y configura para integrar con Facebook

# facebook:
#   verify: "<verify_token>"
#   secret: "<app_secret>"
#   page-access-token: "<page_access_token>"

# ============================================================
# SLACK
# ============================================================
# Descomenta y configura para integrar con Slack

# slack:
#   slack_token: "<slack_token>"
#   slack_channel: "<slack_channel>"
#   slack_signing_secret: "<slack_signing_secret>"

# ============================================================
# TELEGRAM
# ============================================================
# Descomenta y configura para integrar con Telegram

# telegram:
#   access_token: "<telegram_access_token>"
#   verify: "<telegram_bot_username>"
#   webhook_url: "<webhook_url>"

# ============================================================
# TWILIO (WhatsApp/SMS)
# ============================================================
# Descomenta y configura para integrar con WhatsApp

# twilio:
#   account_sid: "<account_sid>"
#   auth_token: "<auth_token>"
#   twilio_number: "<twilio_number>"

# ============================================================
# WHATSAPP (Usando Twilio o proveedor alternativo)
# ============================================================
# Para WhatsApp Business API

# twilio:
#   account_sid: "<AC...>"
#   auth_token: "<...>"
#   twilio_number: "whatsapp:+14155238886"

# ============================================================
# SOCKET.IO (Para chat en tiempo real)
# ============================================================

# socketio:
#   user_message_evt: user_uttered
#   bot_message_evt: bot_uttered
#   session_persistence: true

# ============================================================
# MATTERMOST
# ============================================================

# mattermost:
#   url: "https://<mattermost_url>"
#   token: "<bot_token>"
#   webhook_url: "<webhook_url>"

# ============================================================
# MICROSOFT BOT FRAMEWORK
# ============================================================

# botframework:
#   app_id: "<microsoft_app_id>"
#   app_password: "<microsoft_app_password>"

# ============================================================
# HANGOUTS / GOOGLE CHAT
# ============================================================

# hangouts:
#   project_id: "<google_project_id>"

# ============================================================
# ROCKET.CHAT
# ============================================================

# rocketchat:
#   user: "<bot_username>"
#   password: "<bot_password>"
#   server_url: "<rocket_chat_server_url>"

# ============================================================
# INSTRUCCIONES PARA PRUEBAS
# ============================================================
# 
# 1. Para probar en consola:
#    rasa shell
#
# 2. Para probar con API REST:
#    rasa run --enable-api --cors "*"
#    
#    Luego envía POST a: http://localhost:5005/webhooks/rest/webhook
#    Con body JSON: {"sender": "user1", "message": "hola"}
#
# 3. Para probar con Rasa X (interfaz web):
#    rasa x
