<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot - Crack MEVM Soluciones Informáticas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --accent-color: #3b82f6;
            --bg-color: #f8fafc;
            --chat-bg: #ffffff;
            --user-msg-bg: #2563eb;
            --bot-msg-bg: #e2e8f0;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border-color: #cbd5e1;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            max-height: 700px;
            background: var(--chat-bg);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow);
        }

        .logo {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: var(--primary-color);
            flex-shrink: 0;
        }

        .header-info {
            flex: 1;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 13px;
            opacity: 0.9;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: var(--bg-color);
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--text-light);
        }

        .message {
            display: flex;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.bot .message-content {
            background: var(--bot-msg-bg);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            margin: 0 10px;
        }

        .message.bot .message-avatar {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            order: -1;
        }

        .message.user .message-avatar {
            background: var(--secondary-color);
            color: white;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: var(--bot-msg-bg);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-indicator.active {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-light);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .chat-input-container {
            padding: 20px 25px;
            background: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .send-button {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .send-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-button svg {
            width: 20px;
            height: 20px;
        }

        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }

        .welcome-message h2 {
            color: var(--text-dark);
            margin-bottom: 10px;
            font-size: 24px;
        }

        .welcome-message p {
            font-size: 15px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .chat-container {
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }

            .chat-header {
                padding: 15px 20px;
            }

            .header-title {
                font-size: 18px;
            }

            .header-subtitle {
                font-size: 12px;
            }

            .logo {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .message-content {
                max-width: 85%;
            }

            .chat-messages {
                padding: 15px;
            }

            .chat-input-container {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .message-content {
                max-width: 90%;
                font-size: 14px;
            }

            .message-avatar {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
        }
    </style>
    <!-- Configuración del servidor - Railway inyecta la URL aquí -->
    <script>
        window.RASA_SERVER_URL = 'https://chatbot-crackmevm-production.up.railway.app/webhooks/rest/webhook';
    </script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="logo">CM</div>
            <div class="header-info">
                <div class="header-title">Crack MEVM</div>
                <div class="header-subtitle">Soluciones Informáticas</div>
            </div>
            <div class="status-indicator"></div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
                <h2>👋 ¡Bienvenido!</h2>
                <p>Soy el asistente virtual de Crack MEVM.<br>
                Puedo ayudarte a agendar servicios de soporte técnico.</p>
                <p style="margin-top: 15px; font-size: 14px;">
                    Escribe "Hola" para comenzar
                </p>
            </div>
        </div>

        <div class="chat-input-container">
            <input 
                type="text" 
                class="chat-input" 
                id="messageInput" 
                placeholder="Escribe tu mensaje..."
                autocomplete="off"
            >
            <button class="send-button" id="sendButton">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        // Configuración del servidor Rasa
        // En producción (Railway), reemplaza esta URL con la URL de tu servicio Railway
        const RASA_SERVER_URL = window.RASA_SERVER_URL || 'http://localhost:5005/webhooks/rest/webhook';

        // Generar ID de sesión único
        let sessionId = localStorage.getItem('chatSessionId');
        if (!sessionId) {
            sessionId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('chatSessionId', sessionId);
        }

        // Cargar historial de chat desde localStorage
        function loadChatHistory() {
            const history = localStorage.getItem('chatHistory');
            if (history) {
                try {
                    const messages = JSON.parse(history);
                    messages.forEach(msg => {
                        addMessage(msg.text, msg.sender, false);
                    });
                } catch (e) {
                    console.error('Error loading chat history:', e);
                }
            }
        }

        // Guardar mensaje en historial
        function saveChatMessage(text, sender) {
            const history = localStorage.getItem('chatHistory');
            let messages = [];
            if (history) {
                try {
                    messages = JSON.parse(history);
                } catch (e) {
                    messages = [];
                }
            }
            messages.push({ text, sender, timestamp: Date.now() });
            // Mantener solo los últimos 50 mensajes
            if (messages.length > 50) {
                messages = messages.slice(-50);
            }
            localStorage.setItem('chatHistory', JSON.stringify(messages));
        }

        // Añadir mensaje al chat
        function addMessage(text, sender, save = true) {
            // Remover mensaje de bienvenida si existe
            const welcomeMsg = chatMessages.querySelector('.welcome-message');
            if (welcomeMsg) {
                welcomeMsg.remove();
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = sender === 'user' ? '👤' : '🤖';

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            if (save) {
                saveChatMessage(text, sender);
            }
        }

        // Mostrar indicador de escritura
        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator active';
            indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

            typingDiv.appendChild(avatar);
            typingDiv.appendChild(indicator);
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Ocultar indicador de escritura
        function hideTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // Enviar mensaje a Rasa
        async function sendMessage(message) {
            if (!message.trim()) return;

            // Añadir mensaje del usuario
            addMessage(message, 'user');
            messageInput.value = '';
            sendButton.disabled = true;

            // Mostrar indicador de escritura
            showTypingIndicator();

            try {
                const response = await fetch(RASA_SERVER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        sender: sessionId,
                        message: message
                    })
                });

                hideTypingIndicator();

                if (!response.ok) {
                    throw new Error('Error en la comunicación con el servidor');
                }

                const data = await response.json();

                // Añadir respuestas del bot
                if (data && data.length > 0) {
                    data.forEach((botMessage, index) => {
                        setTimeout(() => {
                            addMessage(botMessage.text, 'bot');
                        }, index * 300);
                    });
                } else {
                    addMessage('Lo siento, no pude procesar tu mensaje. Por favor intenta de nuevo.', 'bot');
                }

            } catch (error) {
                hideTypingIndicator();
                console.error('Error:', error);
                addMessage('⚠️ No puedo conectarme al servidor. Asegúrate de que Rasa esté ejecutándose en ' + RASA_SERVER_URL, 'bot');
            } finally {
                sendButton.disabled = false;
                messageInput.focus();
            }
        }

        // Event listeners
        sendButton.addEventListener('click', () => {
            const message = messageInput.value;
            sendMessage(message);
        });

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const message = messageInput.value;
                sendMessage(message);
            }
        });

        // Cargar historial al iniciar
        loadChatHistory();

        // Focus en el input al cargar
        messageInput.focus();

        // Limpiar historial antiguo (más de 7 días)
        function cleanOldHistory() {
            const history = localStorage.getItem('chatHistory');
            if (history) {
                try {
                    const messages = JSON.parse(history);
                    const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
                    const filtered = messages.filter(msg => msg.timestamp > sevenDaysAgo);
                    localStorage.setItem('chatHistory', JSON.stringify(filtered));
                } catch (e) {
                    console.error('Error cleaning history:', e);
                }
            }
        }

        cleanOldHistory();
    </script>
</body>
</html>
